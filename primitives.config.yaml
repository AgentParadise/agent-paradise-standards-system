# Agentic Primitives Configuration
# Points to primitives from the agentic-primitives submodule

version: "1.0"

# System-level specification version
spec_version: "v1"

# Repository metadata
repository:
  name: "agent-paradise-standards-system"
  version: "0.1.0"
  description: "Agent Paradise Standards System"

# Directory paths - pointing to the submodule
paths:
  specs: "lib/agentic-primitives/specs/v1"
  primitives: "lib/agentic-primitives/primitives/v1"
  experimental: "lib/agentic-primitives/primitives/experimental"
  providers: "lib/agentic-primitives/providers"
  docs: "docs"

# Validation settings
validation:
  structural: true
  schema: true
  semantic: true
  strict: true
  hash_algorithm: "blake3"
  verify_hashes: true

# Provider settings
providers:
  default: "claude"
  enabled:
    - "claude"
    - "openai"
    - "cursor"

  claude:
    output_dir: ".claude"
    default_model: "claude/opus"
    hook_timeout: 60

# Build settings
build:
  output_dir: "build"
  clean_before_build: true
  generate_files: true

# Installation settings
install:
  default_target: "project"
  project_paths:
    claude: ".claude"
    openai: ".openai"
    cursor: ".cursor"
  merge_strategy: "preserve"

