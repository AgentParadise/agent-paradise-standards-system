schema = "aps.experiment/v1"

[experiment]
id = "{{id}}"
name = "{{name}}"
slug = "{{slug}}"
version = "{{version}}"
category = "{{category}}"

[aps]
aps_major = "v1"

[ownership]
maintainers = [{{#each maintainers}}"{{this}}"{{#unless @last}}, {{/unless}}{{/each}}]

