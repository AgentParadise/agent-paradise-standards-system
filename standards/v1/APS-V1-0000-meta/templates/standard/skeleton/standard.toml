schema = "aps.standard/v1"

[standard]
id = "{{id}}"
name = "{{name}}"
slug = "{{slug}}"
version = "{{version}}"
category = "{{category}}"
status = "active"
backwards_compat = true  # Set to false when introducing breaking changes

[aps]
aps_major = "v1"
backwards_compatible_major_required = true

[ownership]
maintainers = [{{#each maintainers}}"{{this}}"{{#unless @last}}, {{/unless}}{{/each}}]

