# Template metadata for standard scaffolding
[template]
name = "standard"
description = "Scaffold a new APS V1 official standard"
version = "1.0.0"

[variables]
id = { required = true, description = "Standard ID (e.g., APS-V1-0001)" }
name = { required = true, description = "Human-readable name" }
slug = { required = true, description = "Filesystem-safe slug (kebab-case)" }
version = { default = "1.0.0", description = "Initial SemVer version" }
category = { default = "governance", description = "Category: governance|technical|design|process|security" }
maintainers = { default = ["AgentParadise"], description = "List of maintainers" }

